<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 600" width="1060" height="600">
  <defs>
    <style>text { font-family: Consolas, 'Courier New', monospace; }</style>
    <marker id="ma" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#60a5fa"/></marker>
    <marker id="mb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#34d399"/></marker>
    <marker id="mc" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#fbbf24"/></marker>
    <marker id="md" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#fb923c"/></marker>
    <marker id="me" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f472b6"/></marker>
    <marker id="mf" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#a78bfa"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1060" height="600" fill="#0f172a" rx="10"/>

  <!-- Title -->
  <text x="530" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#f1f5f9">Veeam VBR 13 — Lab Topology</text>
  <text x="530" y="51" text-anchor="middle" font-size="10" fill="#475569">VLAN 200 · 10.10.200.0/24 · ESXi</text>

  <!-- ==================== ZONE 1: PRODUCTION ==================== -->
  <rect x="8" y="58" width="265" height="452" fill="#0c1424" stroke="#3b82f6" stroke-width="1.5" rx="7"/>
  <text x="141" y="76" text-anchor="middle" font-size="10" font-weight="bold" fill="#93c5fd" letter-spacing="2">PRODUCTION</text>

  <!-- vCenter -->
  <rect x="18" y="84" width="245" height="56" fill="#1e3a8a" rx="5"/>
  <text x="141" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">vCenter</text>
  <text x="141" y="126" text-anchor="middle" font-size="10" fill="#93c5fd">&lt;vcenter-fqdn&gt;</text>

  <!-- DC01 -->
  <rect x="18" y="188" width="245" height="78" fill="#1d4ed8" rx="5"/>
  <text x="141" y="211" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">dc01</text>
  <text x="141" y="230" text-anchor="middle" font-size="10" fill="#bfdbfe">10.10.200.11</text>
  <text x="141" y="250" text-anchor="middle" font-size="9" fill="#93c5fd">Win Server 2022 · VMware VM</text>

  <!-- DC02 -->
  <rect x="18" y="316" width="245" height="78" fill="#1d4ed8" rx="5"/>
  <text x="141" y="339" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">dc02</text>
  <text x="141" y="358" text-anchor="middle" font-size="10" fill="#bfdbfe">10.10.200.12</text>
  <text x="141" y="378" text-anchor="middle" font-size="9" fill="#93c5fd">Win Server 2022 · Agent target</text>

  <!-- ==================== ZONE 2: VEEAM SERVER ==================== -->
  <rect x="285" y="58" width="255" height="452" fill="#071208" stroke="#22c55e" stroke-width="1.5" rx="7"/>
  <text x="413" y="76" text-anchor="middle" font-size="10" font-weight="bold" fill="#86efac" letter-spacing="2">VEEAM SERVER</text>

  <!-- VBR-01 -->
  <rect x="295" y="152" width="235" height="102" fill="#14532d" rx="5"/>
  <rect x="295" y="152" width="235" height="22" fill="#166534" rx="5"/>
  <text x="413" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#4ade80">VBR-01  ·  MAIN</text>
  <text x="413" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Veeam VBR 13.0.1</text>
  <text x="413" y="213" text-anchor="middle" font-size="10" fill="#bbf7d0">10.10.200.21</text>
  <text x="413" y="231" text-anchor="middle" font-size="9" fill="#86efac">Windows Server 2022</text>

  <!-- VBR-02 (dashed = standby) -->
  <rect x="295" y="346" width="235" height="88" fill="#052e16" rx="5" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="413" y="372" text-anchor="middle" font-size="10" font-weight="bold" fill="#4ade80">VBR-02  ·  STANDBY</text>
  <text x="413" y="392" text-anchor="middle" font-size="10" fill="#bbf7d0">10.10.200.22</text>
  <text x="413" y="412" text-anchor="middle" font-size="9" fill="#86efac">Config Restore target</text>

  <!-- ==================== ZONE 3: HARDENED STORAGE ==================== -->
  <rect x="552" y="58" width="500" height="452" fill="#160900" stroke="#f59e0b" stroke-width="1.5" rx="7"/>
  <text x="802" y="76" text-anchor="middle" font-size="10" font-weight="bold" fill="#fcd34d" letter-spacing="2">HARDENED STORAGE</text>

  <!-- VHR-01 -->
  <rect x="562" y="126" width="480" height="102" fill="#78350f" rx="5"/>
  <rect x="562" y="126" width="480" height="22" fill="#92400e" rx="5"/>
  <text x="802" y="142" text-anchor="middle" font-size="10" font-weight="bold" fill="#fbbf24">VHR-01  ·  PRIMARY REPO</text>
  <text x="802" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Linux Hardened Repository</text>
  <text x="802" y="185" text-anchor="middle" font-size="10" fill="#fde68a">10.10.200.31  ·  Ubuntu 24.04</text>
  <text x="802" y="205" text-anchor="middle" font-size="9" fill="#fcd34d">XFS reflink · Immutability 7d · 500 GB</text>

  <!-- VHR-02 -->
  <rect x="562" y="326" width="480" height="102" fill="#713f12" rx="5"/>
  <rect x="562" y="326" width="480" height="22" fill="#854d0e" rx="5"/>
  <text x="802" y="342" text-anchor="middle" font-size="10" font-weight="bold" fill="#fbbf24">VHR-02  ·  COPY REPO</text>
  <text x="802" y="366" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Linux Hardened Repository</text>
  <text x="802" y="385" text-anchor="middle" font-size="10" fill="#fde68a">10.10.200.32  ·  Ubuntu 24.04</text>
  <text x="802" y="405" text-anchor="middle" font-size="9" fill="#fcd34d">XFS reflink · Immutability 7d · 500 GB</text>

  <!-- ==================== ARROWS ==================== -->

  <!-- 1. vCenter → VBR-01 (VMware API, blue dashed) -->
  <path d="M 263 112 C 278 112, 284 164, 295 174" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#ma)"/>

  <!-- 2. DC01 → VBR-01 (VMware Backup, blue solid) -->
  <line x1="263" y1="227" x2="294" y2="212" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#ma)"/>
  <rect x="249" y="212" width="50" height="14" rx="2" fill="#0f172a"/>
  <text x="274" y="223" text-anchor="middle" font-size="8.5" fill="#93c5fd">VMware</text>

  <!-- 3. DC02 → VBR-01 (Agent Backup, green, curved) -->
  <path d="M 263 355 C 278 308, 283 268, 295 242" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#mb)"/>
  <rect x="257" y="292" width="44" height="28" rx="2" fill="#0f172a"/>
  <text x="279" y="304" text-anchor="middle" font-size="8.5" fill="#6ee7b7">Agent</text>
  <text x="279" y="316" text-anchor="middle" font-size="8.5" fill="#6ee7b7">Backup</text>

  <!-- 4. VBR-01 → VHR-01 (Backup Jobs, amber) -->
  <!-- Main arrow from VBR-01 right edge to VHR-01 left edge -->
  <line x1="530" y1="196" x2="561" y2="174" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#mc)"/>
  <!-- Label badge: entirely inside Storage zone, above VHR-01 -->
  <rect x="568" y="90" width="82" height="28" rx="3" fill="#0f172a" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="609" y="104" text-anchor="middle" font-size="9" fill="#fcd34d">Backup</text>
  <text x="609" y="116" text-anchor="middle" font-size="9" fill="#fcd34d">Jobs</text>
  <!-- Thin connector from badge to arrowhead area -->
  <path d="M 609 118 C 609 144, 575 158, 562 172" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>

  <!-- 5. VHR-01 → VHR-02 (Copy Job Immediate, orange, vertical) -->
  <line x1="802" y1="228" x2="802" y2="325" stroke="#fb923c" stroke-width="2.5" marker-end="url(#md)"/>
  <rect x="810" y="260" width="84" height="28" rx="2" fill="#0f172a"/>
  <text x="852" y="272" text-anchor="middle" font-size="9" fill="#fdba74">Copy Job</text>
  <text x="852" y="284" text-anchor="middle" font-size="9" fill="#fdba74">(Immediate)</text>

  <!-- 6. VBR-01 → VBR-02 (Failover .bco, violet dashed) -->
  <line x1="413" y1="254" x2="413" y2="345" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#mf)"/>
  <rect x="418" y="285" width="58" height="28" rx="2" fill="#0f172a"/>
  <text x="447" y="297" text-anchor="middle" font-size="8.5" fill="#c4b5fd">.bco file</text>
  <text x="447" y="309" text-anchor="middle" font-size="8.5" fill="#c4b5fd">Failover</text>

  <!-- 7. VBR-01 → VHR-02 (Config Backup, pink dashed, bottom route) -->
  <path d="M 430 254 C 430 492, 802 492, 802 428" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#me)"/>
  <!-- Label: in Storage zone bottom area, well below VHR-02 (bottom=428) -->
  <rect x="628" y="462" width="126" height="17" rx="2" fill="#0f172a"/>
  <text x="691" y="475" text-anchor="middle" font-size="9" fill="#f9a8d4">Config Backup (.bco)</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="8" y="518" width="1044" height="68" fill="#1e293b" rx="6"/>
  <text x="22" y="535" font-size="9" font-weight="bold" fill="#94a3b8">Legend:</text>

  <!-- Row 1 -->
  <line x1="78" y1="532" x2="100" y2="532" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="105" y="536" font-size="9" fill="#94a3b8">VMware Backup</text>

  <line x1="213" y1="532" x2="235" y2="532" stroke="#34d399" stroke-width="2.5"/>
  <text x="240" y="536" font-size="9" fill="#94a3b8">Agent Backup</text>

  <line x1="338" y1="532" x2="360" y2="532" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="365" y="536" font-size="9" fill="#94a3b8">Backup Jobs → Primary Repo</text>

  <line x1="552" y1="532" x2="574" y2="532" stroke="#fb923c" stroke-width="2.5"/>
  <text x="579" y="536" font-size="9" fill="#94a3b8">Copy Job (Immediate)</text>

  <line x1="712" y1="532" x2="734" y2="532" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="739" y="536" font-size="9" fill="#94a3b8">Config Backup (.bco)</text>

  <line x1="878" y1="532" x2="900" y2="532" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="905" y="536" font-size="9" fill="#94a3b8">Failover/Standby</text>

  <!-- Row 2 -->
  <line x1="78" y1="557" x2="100" y2="557" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="105" y="561" font-size="9" fill="#94a3b8">VMware API (management plane)</text>

  <rect x="348" y="549" width="8" height="8" rx="1" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="361" y="561" font-size="9" fill="#94a3b8">Dashed border = Standby (not active)</text>

  <text x="700" y="561" font-size="9" fill="#475569">VLAN 200 · 10.10.200.0/24 · ESXi Home Lab</text>
</svg>
