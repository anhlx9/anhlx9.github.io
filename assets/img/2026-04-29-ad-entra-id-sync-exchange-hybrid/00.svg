  <text x="220" y="413" text-anchor="middle" font-size="12" font-weight="bold" fill="#784212">GW: 10.10.200.1</text>

  <!-- Lines DC1 → domain label -->
  <line x1="127" y1="196" x2="185" y2="340" stroke="#2980B9" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- Lines EXCH → domain label -->
  <line x1="327" y1="196" x2="280" y2="340" stroke="#2980B9" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- Lines SYNC → domain label -->
  <line x1="127" y1="310" x2="175" y2="340" stroke="#2980B9" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- Lines WIN11-01 → domain label -->
  <line x1="327" y1="310" x2="285" y2="340" stroke="#2980B9" stroke-width="1.2" stroke-dasharray="3,2"/>
  <!-- domain → GW -->
  <line x1="220" y1="372" x2="220" y2="392" stroke="#E67E22" stroke-width="1.5"/>

