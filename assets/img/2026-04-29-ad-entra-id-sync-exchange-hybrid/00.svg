  <rect x="40" y="236" width="175" height="12" fill="#8E44AD"/>
  <text x="127" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="white">SYNC</text>
  <text x="127" y="264" text-anchor="middle" font-size="11" fill="#6C3483">Microsoft Entra Connect</text>
  <text x="127" y="279" text-anchor="middle" font-size="11" fill="#6C3483">PHS + SSPR Writeback</text>
  <text x="127" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#8E44AD">10.10.200.15</text>

  <!-- WIN11-01 -->
  <rect x="235" y="220" width="185" height="90" rx="8" fill="white" stroke="#2471A3" stroke-width="1.5"/>
  <rect x="235" y="220" width="185" height="28" rx="8" fill="#2471A3"/>
  <rect x="235" y="236" width="185" height="12" fill="#2471A3"/>
  <text x="327" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="white">WS2022-01</text>
  <text x="327" y="264" text-anchor="middle" font-size="11" fill="#1A5276">Windows Server 2022</text>
  <text x="327" y="279" text-anchor="middle" font-size="11" fill="#1A5276">Domain Joined</text>
  <text x="327" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980B9">10.10.200.17</text>

