  <ellipse cx="560" cy="280" rx="68" ry="45" fill="#EBF5FB" stroke="#85C1E9" stroke-width="2"/>
  <text x="560" y="274" text-anchor="middle" font-size="13" font-weight="bold" fill="#2471A3">Internet</text>
  <text x="560" y="291" text-anchor="middle" font-size="11" fill="#2471A3">HTTPS / 443</text>

  <!-- GW → Internet -->
  <line x1="300" y1="408" x2="494" y2="292" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="494,292 482,289 487,300" fill="#E67E22"/>

