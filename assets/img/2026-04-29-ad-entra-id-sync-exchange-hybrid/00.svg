  <text x="327" y="150" text-anchor="middle" font-size="11" fill="#0E6655">Exchange Server 2019</text>
  <text x="327" y="165" text-anchor="middle" font-size="11" fill="#0E6655">Mailbox Role</text>
  <text x="327" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#16A085">10.10.200.13</text>

