  <text x="35" y="519" font-size="11" font-weight="bold" fill="#2C3E50">Legend:</text>

  <line x1="90" y1="515" x2="120" y2="515" stroke="#8E44AD" stroke-width="2.5"/>
  <text x="125" y="519" font-size="10" fill="#2C3E50">Entra Connect (PHS)</text>

  <line x1="258" y1="515" x2="288" y2="515" stroke="#0078D4" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="293" y="519" font-size="10" fill="#2C3E50">Exchange Hybrid</text>

  <line x1="408" y1="515" x2="438" y2="515" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="443" y="519" font-size="10" fill="#2C3E50">Password Writeback</text>

  <line x1="568" y1="515" x2="598" y2="515" stroke="#E67E22" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="603" y="519" font-size="10" fill="#2C3E50">Internet (HTTPS)</text>

  <text x="35" y="540" font-size="10" fill="#566573">* anhlx.lab = internal AD domain (non-routable)  |  AnhLe267.onmicrosoft.com = M365 trial tenant domain  |  UPN suffix added to AD users for cloud sync</text>
</svg>
