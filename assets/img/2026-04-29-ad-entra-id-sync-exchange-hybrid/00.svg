  <text x="800" y="150" text-anchor="middle" font-size="11" fill="#1A5276">(Azure Active Directory)</text>
  <text x="800" y="166" text-anchor="middle" font-size="11" fill="#1A5276">AnhLe267.onmicrosoft.com</text>
  <text x="800" y="184" text-anchor="middle" font-size="11" fill="#2E86C1">Users, Groups, Licenses</text>

