  <rect x="678" y="228" width="244" height="28" rx="8" fill="#0078D4"/>
  <rect x="678" y="244" width="244" height="12" fill="#0078D4"/>
  <text x="800" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Exchange Online</text>
  <text x="800" y="272" text-anchor="middle" font-size="11" fill="#154360">M365 Mail Service</text>
  <text x="800" y="288" text-anchor="middle" font-size="11" fill="#154360">Shared GAL, Free/Busy</text>
  <text x="800" y="306" text-anchor="middle" font-size="11" fill="#154360">Mailbox Migration</text>

  <!-- M365 Apps -->
  <rect x="678" y="348" width="244" height="80" rx="8" fill="white" stroke="#5D6D7E" stroke-width="1.5"/>
  <rect x="678" y="348" width="244" height="28" rx="8" fill="#217346"/>
  <rect x="678" y="364" width="244" height="12" fill="#217346"/>
  <text x="800" y="366" text-anchor="middle" font-size="12" font-weight="bold" fill="white">M365 Apps</text>
  <text x="800" y="392" text-anchor="middle" font-size="11" fill="#1E8449">Teams, SharePoint</text>
  <text x="800" y="408" text-anchor="middle" font-size="11" fill="#1E8449">OneDrive, Outlook Web</text>

  <!-- Internet → Entra ID -->
  <line x1="628" y1="265" x2="678" y2="180" stroke="#1A73E8" stroke-width="2"/>
  <polygon points="678,180 667,183 672,193" fill="#1A73E8"/>

  <!-- ========== KEY CONNECTIONS ========== -->

  <!-- SYNC → Internet (Entra Connect sync) -->
  <path d="M215 265 Q 390 150 492 255" stroke="#8E44AD" stroke-width="2.5" fill="none"/>
  <polygon points="492,255 480,250 483,262" fill="#8E44AD"/>
  <rect x="275" y="148" width="148" height="22" rx="4" fill="#F4ECF7" stroke="#8E44AD" stroke-width="1"/>
  <text x="349" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#6C3483">Entra Connect Sync (PHS)</text>

  <!-- EXCH → Exchange Online (Hybrid) -->
  <path d="M420 150 Q 560 60 678 268" stroke="#0078D4" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <polygon points="678,268 666,261 672,272" fill="#0078D4"/>
  <rect x="490" y="55" width="130" height="20" rx="4" fill="#EBF5FB" stroke="#0078D4" stroke-width="1"/>
  <text x="555" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#154360">Exchange Hybrid (HCW)</text>

  <!-- Password Writeback arrow -->
  <path d="M 492 300 Q 390 190 215 290" stroke="#E74C3C" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="215,290 226,283 228,295" fill="#E74C3C"/>
  <rect x="255" y="195" width="130" height="20" rx="4" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="320" y="209" text-anchor="middle" font-size="10" font-weight="bold" fill="#922B21">Password Writeback</text>

