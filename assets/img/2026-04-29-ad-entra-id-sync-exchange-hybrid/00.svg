  <!-- DC1 -->
  <rect x="40" y="106" width="175" height="90" rx="8" fill="white" stroke="#2471A3" stroke-width="1.5"/>
  <rect x="40" y="106" width="175" height="28" rx="8" fill="#2471A3"/>
  <rect x="40" y="122" width="175" height="12" fill="#2471A3"/>
