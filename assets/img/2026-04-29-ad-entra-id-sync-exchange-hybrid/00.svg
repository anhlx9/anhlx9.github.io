  <text x="127" y="150" text-anchor="middle" font-size="11" fill="#1A5276">Active Directory DS</text>
  <text x="127" y="165" text-anchor="middle" font-size="11" fill="#1A5276">DNS Server</text>
  <text x="127" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#2980B9">10.10.200.11</text>

  <!-- EXCH -->
  <rect x="235" y="106" width="185" height="90" rx="8" fill="white" stroke="#16A085" stroke-width="1.5"/>
