<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa4b2"/>
    </marker>
    <marker id="arrowDash" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#d29922"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="980" height="720" fill="#0d1117"/>

  <!-- title -->
  <text x="490" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#e6edf3">MinIO AIStor Enterprise · cluster 4 node EC:4</text>
  <text x="490" y="60" text-anchor="middle" font-size="13" fill="#8b949e">AD-IAM (LDAPS) · Mã hóa riêng từng bucket (KES + Vault) · Versioning · Object Lock Compliance</text>

  <!-- ===== DC01 ===== -->
  <rect x="340" y="86" width="300" height="96" rx="10" fill="#13233d" stroke="#3b82f6" stroke-width="2"/>
  <text x="490" y="114" text-anchor="middle" font-size="15" font-weight="700" fill="#cfe0ff">DC01 — Windows Server 2025</text>
  <text x="490" y="136" text-anchor="middle" font-size="12" fill="#adc4ee">AD DS · DNS · NTP · AD CS (ANHLX-CA)</text>
  <text x="490" y="156" text-anchor="middle" font-size="12" fill="#7f9bc4">10.10.200.5 · anhlx.lab · cấp toàn bộ cert</text>

  <!-- DC links bus -->
  <text x="490" y="208" text-anchor="middle" font-size="11" fill="#8b949e">LDAPS 636 · DNS 53 · NTP 123 · cấp cert</text>
  <path d="M460,182 L460,250" stroke="#9aa4b2" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M600,168 L832,248" stroke="#9aa4b2" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Client ===== -->
  <rect x="40" y="300" width="170" height="92" rx="10" fill="#21262d" stroke="#8b949e" stroke-width="1.6"/>
  <text x="125" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#e6edf3">Browser · mc · boto3</text>
  <text x="125" y="352" text-anchor="middle" font-size="10.5" fill="#9aa4b2">s3.anhlx.lab · API</text>
  <text x="125" y="370" text-anchor="middle" font-size="10.5" fill="#9aa4b2">console.anhlx.lab · UI</text>

  <!-- client -> svc01 -->
  <text x="255" y="333" text-anchor="middle" font-size="11" fill="#58a6ff">HTTPS 443</text>
  <path d="M210,346 L300,346" stroke="#9aa4b2" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== svc01 ===== -->
  <rect x="300" y="250" width="362" height="372" rx="12" fill="#0f2a22" stroke="#2ea043" stroke-width="2"/>
  <text x="481" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#9ae6b4">svc01 — Ubuntu 24.04 · Docker Compose</text>
  <text x="481" y="297" text-anchor="middle" font-size="11" fill="#6fbf8e">10.10.200.10 · s3.anhlx.lab</text>

  <!-- HAProxy -->
  <rect x="324" y="312" width="314" height="36" rx="7" fill="#1b3a2e" stroke="#2ea043" stroke-width="1.3"/>
  <text x="481" y="335" text-anchor="middle" font-size="11.5" fill="#d6f3e2">HAProxy :443 (TLS) — s3 API :9000 · console UI :9001</text>

  <!-- KES + Vault -->
  <rect x="324" y="360" width="150" height="44" rx="7" fill="#1b3a2e" stroke="#2ea043" stroke-width="1.3"/>
  <text x="399" y="382" text-anchor="middle" font-size="12.5" fill="#d6f3e2">KES</text>
  <text x="399" y="397" text-anchor="middle" font-size="10.5" fill="#7fcf9f">:7373</text>
  <rect x="488" y="360" width="150" height="44" rx="7" fill="#1b3a2e" stroke="#2ea043" stroke-width="1.3"/>
  <text x="563" y="382" text-anchor="middle" font-size="12.5" fill="#d6f3e2">Vault</text>
  <text x="563" y="397" text-anchor="middle" font-size="10.5" fill="#7fcf9f">:8200 · unseal thủ công</text>
  <!-- KES <-> Vault -->
  <path d="M474,382 L488,382" stroke="#d6f3e2" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <text x="481" y="424" text-anchor="middle" font-size="10.5" fill="#6fbf8e">KES ⇄ Vault — keystore SSE-KMS (khóa/bucket)</text>

  <!-- Prometheus -->
  <rect x="324" y="440" width="314" height="36" rx="7" fill="#1b3a2e" stroke="#2ea043" stroke-width="1.3"/>
  <text x="481" y="463" text-anchor="middle" font-size="12.5" fill="#d6f3e2">Prometheus  :9090 (TLS)</text>
  <!-- Grafana -->
  <rect x="324" y="484" width="314" height="36" rx="7" fill="#1b3a2e" stroke="#2ea043" stroke-width="1.3"/>
  <text x="481" y="507" text-anchor="middle" font-size="12.5" fill="#d6f3e2">Grafana  :3000 (TLS)</text>

  <!-- svc01 -> minio (S3) -->
  <text x="690" y="330" text-anchor="middle" font-size="11" fill="#58a6ff">9000/9001 (TLS)</text>
  <path d="M638,335 L730,348" stroke="#9aa4b2" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <!-- prometheus scrape -->
  <text x="690" y="452" text-anchor="middle" font-size="10.5" fill="#d29922">scrape 9000</text>
  <path d="M638,460 L730,470" stroke="#d29922" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrowDash)"/>

  <!-- ===== MinIO cluster ===== -->
  <rect x="730" y="250" width="212" height="372" rx="12" fill="#2b1416" stroke="#c72e29" stroke-width="2"/>
  <text x="836" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#f3b3ae">Cụm MinIO AIStor</text>
  <text x="836" y="297" text-anchor="middle" font-size="11" fill="#d98b86">EC:4 (12+4) · 16 ổ · ~600 GB usable</text>

  <!-- nodes -->
  <g font-size="12.5">
    <rect x="750" y="314" width="172" height="56" rx="7" fill="#3a1a1c" stroke="#e5534b" stroke-width="1.3"/>
    <text x="836" y="338" text-anchor="middle" fill="#f7d2cf" font-weight="600">minio1 · 10.10.200.11</text>
    <text x="836" y="356" text-anchor="middle" fill="#d98b86" font-size="10.5">4×50GB data · :9000/:9001</text>

    <rect x="750" y="378" width="172" height="56" rx="7" fill="#3a1a1c" stroke="#e5534b" stroke-width="1.3"/>
    <text x="836" y="402" text-anchor="middle" fill="#f7d2cf" font-weight="600">minio2 · 10.10.200.12</text>
    <text x="836" y="420" text-anchor="middle" fill="#d98b86" font-size="10.5">4×50GB data · :9000/:9001</text>

    <rect x="750" y="442" width="172" height="56" rx="7" fill="#3a1a1c" stroke="#e5534b" stroke-width="1.3"/>
    <text x="836" y="466" text-anchor="middle" fill="#f7d2cf" font-weight="600">minio3 · 10.10.200.13</text>
    <text x="836" y="484" text-anchor="middle" fill="#d98b86" font-size="10.5">4×50GB data · :9000/:9001</text>

    <rect x="750" y="506" width="172" height="56" rx="7" fill="#3a1a1c" stroke="#e5534b" stroke-width="1.3"/>
    <text x="836" y="530" text-anchor="middle" fill="#f7d2cf" font-weight="600">minio4 · 10.10.200.14</text>
    <text x="836" y="548" text-anchor="middle" fill="#d98b86" font-size="10.5">4×50GB data · :9000/:9001</text>
  </g>
  <text x="836" y="588" text-anchor="middle" font-size="10.5" fill="#d98b86">erasure set 16 ổ · chịu mất 1 node</text>

  <!-- footer -->
  <line x1="40" y1="652" x2="940" y2="652" stroke="#30363d" stroke-width="1"/>
  <text x="490" y="678" text-anchor="middle" font-size="11.5" fill="#8b949e">Subnet 10.10.200.0/24 · VLAN 200 (isolated) — MỌI kết nối dùng HTTPS/LDAPS, verify qua AD Root CA, gọi bằng FQDN</text>
</svg>
