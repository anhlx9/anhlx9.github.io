<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" width="1200" height="960">
<style>
  text{font-family:'SF Pro Display','Segoe UI',system-ui,sans-serif}
  .tt{font-size:21px;font-weight:700;fill:#F1F5F9;letter-spacing:-.5px}
  .ts{font-size:11px;fill:#5E7490;letter-spacing:1.2px}
  .te{font-size:12px;font-weight:600;fill:#7090AA;letter-spacing:.8px}
  .tsc{font-size:10px;font-weight:700;fill:#6A8098;letter-spacing:2px}
  .tn{font-size:21px;font-weight:700;fill:#F8FAFC}
  .tsp{font-size:11px;fill:#8AAABE}
  .tbh{font-size:12.5px;font-weight:700;fill:#FFF;text-anchor:middle}
  .tbs{font-size:11.5px;fill:#CBD8E6;text-anchor:middle}
  .tbg{font-size:9.5px;font-weight:700;fill:#FFF;text-anchor:middle}
  .tbr{font-size:12.5px;font-weight:800;fill:#FFF;text-anchor:middle;letter-spacing:1.5px}
  .tnn{font-size:14px;font-weight:700}
  .tns{font-size:11.5px;fill:#8AAABE}
  .tni{font-size:10.5px;font-weight:700;fill:#FFF;text-anchor:middle}
  .tan{font-size:11.5px;font-weight:700}
  .trn{font-size:15px;font-weight:700;fill:#F8FAFC}
  .trs{font-size:11.5px;fill:#8AAABE}
  .tri{font-size:11.5px;fill:#60A5FA;font-weight:600}
</style>
<defs>
  <pattern id="pts" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".9" fill="#172033" opacity=".7"/>
  </pattern>
  <linearGradient id="gbr" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#6366F1"/>
    <stop offset="100%" stop-color="#A855F7"/>
  </linearGradient>
  <linearGradient id="gav" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="60%" stop-color="#4338CA"/>
    <stop offset="100%" stop-color="#1E3A8A" stop-opacity=".4"/>
  </linearGradient>
  <linearGradient id="gtl" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#6366F1"/>
    <stop offset="60%" stop-color="#4F46E5" stop-opacity=".3"/>
    <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="gc" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1D4ED8"/>
    <stop offset="100%" stop-color="#1E3A8A"/>
  </linearGradient>
  <linearGradient id="gcp" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#065F46"/>
    <stop offset="100%" stop-color="#064E3B"/>
  </linearGradient>
  <linearGradient id="gs" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#9D174D"/>
    <stop offset="100%" stop-color="#831843"/>
  </linearGradient>
  <filter id="fsh" x="-5%" y="-5%" width="110%" height="115%">
    <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000" flood-opacity=".5"/>
  </filter>
</defs>

